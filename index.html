<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Juego del Impostor</title>
<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>

<body>

<h1>🕵️ Juego del Impostor</h1>

<div id="menu">

<input id="nombre" placeholder="Tu nombre">

<button onclick="crearSala()">Crear sala</button>

<input id="codigoSala" placeholder="Código sala">
<button onclick="unirseSala()">Unirse</button>

</div>

<div id="sala" class="hidden">

<h2>Sala: <span id="codigo"></span></h2>

<h3>Jugadores</h3>
<ul id="listaJugadores"></ul>

<button id="iniciarBtn" onclick="iniciarJuego()">Iniciar juego</button>

</div>

<div id="juego" class="hidden">

<h2 id="categoria"></h2>

<div id="infoJugador"></div>

<h3>Votar</h3>
<div id="votacion"></div>

</div>

<script src="game.js"></script>

</body>
</html>
