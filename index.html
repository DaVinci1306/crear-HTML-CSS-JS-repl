<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Juego del Impostor</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        .hidden { display: none; }
        body { font-family: sans-serif; text-align: center; background: #f0f0f0; }
        .card { background: white; padding: 20px; border-radius: 10px; display: inline-block; margin-top: 50px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        button { padding: 10px 20px; cursor: pointer; margin: 10px; }
        select { padding: 8px; margin: 10px; }
    </style>
</head>
<body>


    <button id="btnVotacion" class="hidden" onclick="empezarVotacion()">Iniciar votación</button>

    <div id="menu" class="card">
        <h1>El Impostor</h1>
        <input type="text" id="nombre" placeholder="Tu nombre">
        <br>
        <button onclick="crearSala()">Crear Sala</button>
        <br>
        <input type="text" id="codigoSala" placeholder="Código de sala">
        <button onclick="unirseSala()">Unirse</button>
    </div>

    <div id="sala" class="card hidden">
        <h2>Sala: <span id="codigo"></span></h2>
        <h3>Jugadores conectados:</h3>
        <ul id="listaJugadores"></ul>

        <hr>
        <h3>Configuración (Solo Host)</h3>
        <label>Modo de juego:</label>
        <select id="modo">
            <option value="original">Modo Original (Impostor sin palabra)</option>
            <option value="relacionado">Modo Relacionado (Palabra parecida)</option>
        </select>
        <br>
        <label>Número de Impostores:</label>
        <select id="numImpostores">
            <option value="1">1 Impostor</option>
            <option value="2">2 Impostores</option>
            <option value="3">3 Impostores</option>
        </select>
        <br>
        <button onclick="iniciarJuego()">¡EMPEZAR JUEGO!</button>
    </div>

    <div id="juego" class="card hidden">
        <div id="categoria" style="font-weight: bold; color: #555;"></div>
        <div id="infoJugador"></div>
        <hr>
        <h3>Votación</h3>
        <p>Discutan y elijan a quién eliminar:</p>
        <div id="votacion"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
